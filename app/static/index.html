<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HF</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --panel-2: #18233d;
      --text: #e8eefc;
      --muted: #9fb0d0;
      --accent: #6ea8ff;
      --accent-2: #4fd1c5;
      --danger: #ff7b7b;
      --ok: #7ddea2;
      --border: rgba(255, 255, 255, 0.08);
      --radius: 10px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      height: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 6px 8px;
      align-items: start;
    }

    .endpoint-field {
      min-width: 0;
    }

    .endpoint-history {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
      min-height: 0;
    }

    .endpoint-history:empty {
      display: none;
    }

    .endpoint-chip {
      font-size: 11px;
      line-height: 1.2;
      padding: 2px 8px;
      border-radius: 999px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .endpoint-chip:hover {
      color: var(--text);
      border-color: rgba(110, 168, 255, 0.35);
    }

    .endpoint-chip.active {
      color: var(--accent);
      border-color: rgba(110, 168, 255, 0.45);
      background: rgba(110, 168, 255, 0.1);
    }

    .toolbar label {
      color: var(--muted);
      font-size: 12px;
    }

    input, select, button {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    input, select {
      width: 100%;
      padding: 7px 10px;
      min-width: 0;
    }

    input:focus, select:focus {
      border-color: rgba(110, 168, 255, 0.55);
    }

    .download-row {
      display: grid;
      grid-template-columns: 1fr 88px 1fr 72px;
      gap: 6px;
      margin-top: 8px;
      align-items: center;
    }

    button.primary {
      padding: 7px 10px;
      font-weight: 600;
      cursor: pointer;
      color: #08111f;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: 0;
    }

    button.primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .sync {
      font-size: 11px;
      color: var(--ok);
      min-width: 3em;
      text-align: right;
    }

    .tasks-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .tasks-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .tasks-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .task {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.02);
      margin-bottom: 6px;
    }

    .task:last-child { margin-bottom: 0; }

    .task-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .repo {
      flex: 1;
      font-weight: 600;
      word-break: break-all;
      min-width: 0;
    }

    .status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .status.pending { background: rgba(110,168,255,0.15); color: var(--accent); }
    .status.running { background: rgba(79,209,197,0.15); color: var(--accent-2); }
    .status.done { background: rgba(125,222,162,0.15); color: var(--ok); }
    .status.failed { background: rgba(255,123,123,0.15); color: var(--danger); }
    .status.cancelled { background: rgba(255,180,100,0.15); color: #ffb464; }

    button.stop-btn {
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      color: var(--danger);
      background: rgba(255, 123, 123, 0.1);
      border: 1px solid rgba(255, 123, 123, 0.3);
    }

    .progress-wrap { margin-top: 6px; }

    .progress-track {
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.3s ease;
    }

    .progress-bar.indeterminate {
      width: 35%;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
    }

    .message {
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 8px;
      font-size: 13px;
    }

    @media (max-width: 720px) {
      .download-row {
        grid-template-columns: 1fr 1fr;
      }
      .download-row button.primary {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <div class="toolbar">
        <label for="hf-endpoint">Endpoint</label>
        <div class="endpoint-field">
          <input id="hf-endpoint" name="hf_endpoint" placeholder="https://huggingface.co" required />
          <div class="endpoint-history" id="endpoint-history"></div>
        </div>
        <span class="sync" id="settings-status"></span>
      </div>
      <form id="download-form" class="download-row">
        <input id="repo-id" name="repo_id" placeholder="仓库 ID" required />
        <select id="repo-type" name="repo_type" title="类型">
          <option value="model">模型</option>
          <option value="dataset">数据集</option>
        </select>
        <input id="filename" name="filename" placeholder="文件路径（可选）" />
        <button type="submit" class="primary" id="submit-btn">下载</button>
      </form>
    </section>

    <section class="panel tasks-panel">
      <div class="tasks-head">
        <span>任务</span>
        <span id="refresh-badge">自动刷新</span>
      </div>
      <div class="tasks-list" id="tasks"></div>
    </section>
  </div>

  <script>
    const form = document.getElementById("download-form");
    const settingsStatus = document.getElementById("settings-status");
    const tasksEl = document.getElementById("tasks");
    const submitBtn = document.getElementById("submit-btn");
    const endpointInput = document.getElementById("hf-endpoint");
    const endpointHistoryEl = document.getElementById("endpoint-history");
    let settingsSaveTimer = null;
    let lastSavedEndpoint = "";
    let endpointHistory = [];

    const statusText = {
      pending: "等待",
      running: "下载中",
      done: "完成",
      failed: "失败",
      cancelled: "已停",
    };

    function formatBytes(num) {
      if (num === null || num === undefined) return "—";
      if (num <= 0) return "0 B";
      const units = ["B", "KB", "MB", "GB", "TB"];
      let size = num;
      let unit = units[0];
      for (let i = 0; i < units.length; i += 1) {
        unit = units[i];
        if (size < 1024 || i === units.length - 1) break;
        size /= 1024;
      }
      return unit === "B" ? `${size} B` : `${size.toFixed(1)} ${unit}`;
    }

    function formatProgressRight(task) {
      const downloaded = task.downloaded_bytes || 0;
      const total = task.total_bytes;
      if (total && total > 0) {
        return `${formatBytes(downloaded)} / ${formatBytes(total)}`;
      }
      return downloaded > 0 ? formatBytes(downloaded) : "…";
    }

    function renderProgress(task) {
      if (task.status === "done") {
        return `
          <div class="progress-wrap">
            <div class="progress-track"><div class="progress-bar" style="width:100%"></div></div>
            <div class="progress-meta"><span>100%</span><span>${formatBytes(task.total_bytes || task.downloaded_bytes)}</span></div>
          </div>`;
      }

      if (task.status !== "running" && task.status !== "pending") {
        return task.message
          ? `<div class="message">${task.message}</div>`
          : "";
      }

      const hasTotal = task.total_bytes && task.total_bytes > 0;
      const pct = hasTotal ? Math.min(100, task.progress || 0) : null;
      const bar = hasTotal
        ? `<div class="progress-bar" style="width:${pct}%"></div>`
        : `<div class="progress-bar indeterminate"></div>`;
      const left = hasTotal ? `${pct}%` : (task.downloaded_bytes > 0 ? "…" : "准备");

      return `
        <div class="progress-wrap">
          <div class="progress-track">${bar}</div>
          <div class="progress-meta"><span>${left}</span><span>${formatProgressRight(task)}</span></div>
        </div>`;
    }

    function renderTasks(items) {
      if (!items.length) {
        tasksEl.innerHTML = '<div class="empty">暂无任务</div>';
        return;
      }

      tasksEl.innerHTML = items.map((task) => {
        const canStop = task.status === "pending" || task.status === "running";
        const stopBtn = canStop
          ? `<button type="button" class="stop-btn" data-stop-id="${task.id}">停</button>`
          : "";
        const sub = task.filename ? task.filename : (task.repo_type === "dataset" ? "数据集" : "整仓");
        return `
        <article class="task">
          <div class="task-top">
            <div class="repo" title="${task.local_path || ""}">${task.repo_id}</div>
            <span class="status ${task.status}">${statusText[task.status] || task.status}</span>
            ${stopBtn}
          </div>
          ${renderProgress(task)}
          ${task.status === "running" || task.status === "pending" ? `<div class="message">${sub}${task.message ? " · " + task.message : ""}</div>` : ""}
        </article>
      `;
      }).join("");
    }

    async function stopTask(taskId) {
      const res = await fetch(`/api/tasks/${taskId}/stop`, { method: "POST" });
      if (!res.ok) {
        const err = await res.json();
        alert(err.detail || "停止失败");
        return;
      }
      await loadTasks();
    }

    async function loadTasks() {
      const res = await fetch("/api/tasks");
      renderTasks(await res.json());
    }

    function endpointLabel(url) {
      try {
        return new URL(url).host;
      } catch {
        return url;
      }
    }

    function renderEndpointHistory() {
      endpointHistoryEl.innerHTML = endpointHistory.map((item) => {
        const active = item === endpointInput.value ? " active" : "";
        return `<button type="button" class="endpoint-chip${active}" data-endpoint="${item}" title="${item}">${endpointLabel(item)}</button>`;
      }).join("");
    }

    async function loadSettings() {
      try {
        const res = await fetch("/api/settings");
        if (!res.ok) throw new Error("load failed");
        const data = await res.json();
        endpointInput.value = data.hf_endpoint || "";
        lastSavedEndpoint = endpointInput.value;
        endpointHistory = Array.isArray(data.endpoint_history) ? data.endpoint_history : [];
        renderEndpointHistory();
      } catch (error) {
        console.error(error);
        settingsStatus.textContent = "失败";
      }
    }

    async function saveSettings(showStatus = true, force = false) {
      const value = endpointInput.value.trim();
      if (!value || (!force && value === lastSavedEndpoint)) return;

      if (showStatus) settingsStatus.textContent = "…";

      try {
        const res = await fetch("/api/settings", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ hf_endpoint: value }),
        });
        if (!res.ok) {
          const err = await res.json();
          settingsStatus.textContent = err.detail || "失败";
          return;
        }
        const data = await res.json();
        endpointInput.value = data.hf_endpoint;
        lastSavedEndpoint = data.hf_endpoint;
        endpointHistory = Array.isArray(data.endpoint_history) ? data.endpoint_history : endpointHistory;
        renderEndpointHistory();
        settingsStatus.textContent = "✓";
      } catch (error) {
        settingsStatus.textContent = "失败";
        console.error(error);
      }
    }

    function scheduleSaveSettings() {
      clearTimeout(settingsSaveTimer);
      settingsStatus.textContent = "…";
      settingsSaveTimer = setTimeout(() => saveSettings(true), 500);
    }

    endpointInput.addEventListener("input", scheduleSaveSettings);
    endpointInput.addEventListener("blur", () => saveSettings(true));

    endpointHistoryEl.addEventListener("click", (event) => {
      const chip = event.target.closest("[data-endpoint]");
      if (!chip) return;
      endpointInput.value = chip.dataset.endpoint;
      renderEndpointHistory();
      saveSettings(true, true);
    });

    tasksEl.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-stop-id]");
      if (!button) return;
      button.disabled = true;
      try {
        await stopTask(button.dataset.stopId);
      } finally {
        button.disabled = false;
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;

      const payload = {
        repo_id: form.repo_id.value.trim(),
        repo_type: form.repo_type.value,
      };
      const filename = form.filename.value.trim();
      if (filename) payload.filename = filename;

      try {
        const res = await fetch("/api/download", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const err = await res.json();
          alert(err.detail || "创建失败");
          return;
        }
        await loadTasks();
      } catch (error) {
        alert("请求失败：" + error.message);
      } finally {
        submitBtn.disabled = false;
      }
    });

    async function init() {
      await Promise.all([loadSettings(), loadTasks()]);
      setInterval(loadTasks, 2000);
    }

    init();
  </script>
</body>
</html>
